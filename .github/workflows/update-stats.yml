name: Update version in README

run: |
  echo "=== Debug: Checking README.md ==="
  cat README.md
  echo "================================"
    
  if grep -q 'v=' README.md; then
    echo "Found 'v=' pattern"
    grep 'v=' README.md
      
    CURRENT=$(grep -oP 'v=\K\d+' README.md | head -1 | sed 's/[^0-9]//g')
      
    echo "Extracted number: '$CURRENT'"
      
    if [[ -n "$CURRENT" && "$CURRENT" =~ ^[0-9]+$ ]]; then
      NEW=$((CURRENT + 1))
      echo "New number: $NEW"
        
      sed -i 's/v=[0-9]*/v='"$NEW"'/' README.md
        
      echo "✅ Updated from $CURRENT to $NEW"
        
      echo "=== Updated README.md ==="
      grep 'v=' README.md
    else
      echo "❌ Error: Extracted number is invalid: '$CURRENT'"
      exit 1
    fi
  else
    echo "❌ No 'v=' pattern found in README.md"
    exit 1
  fi
