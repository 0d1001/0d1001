name: Update Last Modified

on:
  schedule:
    - cron: '0 * * * *'  
  workflow_dispatch:

jobs:
  update-timestamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Update last modified date
        run: |
          DATE=$(date +'%Y-%m-%d %H:%M:%S UTC')
          sed -i "s/Last updated:.*/Last updated: $DATE/" README.md
          echo "Updated to: $DATE"
      
      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Update last modified timestamp [skip ci]" || echo "No changes"
          git push
