name: Auto Increment Version

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  increment:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Increment number in .md
        run: |
          if grep -q 'v=' README.md; then
            CURRENT=$(grep -oP 'v=\K\d+' README.md)
            NEW=$((CURRENT + 1))
            sed -i "s/v=$CURRENT/v=$NEW/" README.md
            echo "✅ Updated from $CURRENT to $NEW"
          else
            echo "❌ No 'v=' pattern found"
            exit 1
          fi
      
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "Increment version to v=$NEW [skip ci]" || echo "No changes"
          git push
