name: Update README Version

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Increment version in README
        run: |
          CURRENT=$(grep -oP 'v=\K\d+' README.md | head -1 | tr -d '[:space:]')
          
          if [[ -z "$CURRENT" ]]; then
            echo "❌ No version number found in pattern 'v='"
            exit 1
          fi
          
          NEW=$((CURRENT + 1))
          
          sed -i "s/v=[0-9]\+/v=$NEW/" README.md
          
          echo "✅ v=$CURRENT → v=$NEW"
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Bump version to v=$NEW [skip ci]"
          git push
